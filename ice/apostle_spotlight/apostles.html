<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
        /* Insert styles here */
        body {
            background-image: url(./images/salt_lake_christus_lds.jpeg);
            color: #E8ECED;
            font-family: Arial;
        }
        h1 {
            font-size: 4em;
            text-align: center;
        }
        .top-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
        }
        .counsellors{
            border-radius: 50%;
            border: 10px solid white;
            object-fit: cover;
            width: 200px;
            height: 200px;
            /* justify-content: center; */
            /* display: block; */
            align-content: center;
        }
        .prophet {
            border-radius: 50%;
            border: 10px solid white;
            object-fit: cover;
            width: 250px;
            height: 250px;
            /* justify-content: center; */
            /* display: block; */
            align-content: center;
        }
        h2 {
            font-size: 2em;
            text-align: center;
        }
        .bottom-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
        }
        .apostles {
            border-radius: 50%;
            border: 10px solid white;
            object-fit: cover;
            width: 150px;
            height: 150px;
            /* justify-content: center; */
            /* justify-content: space-around; */
            /* align-self: center; */
            /* display: block; */
            align-content: center;
        }
    </style>
</head>
<body>
    <!-- Insert HTML elements here -->
     <h1 id="presidency">First Presidency</h1>
     <header class="top-grid">
        <img src="./images/eyring.webp" alt="President Eyring" class="counsellors">
        <img src="./images/oaks.webp" alt="President Oaks" class="prophet">
        <img src="./images/christofferson.webp" alt="President Christofferson" class="counsellors">
     </header>
     <h2 id="quorum">Quorum of the Twelve Apostles</h2>
     <main class="bottom-grid">
        <img src="./images/holland.webp" alt="Elder Holland" class="apostles">
        <img src="./images/uchtdorf.webp" alt="Elder Uchtdorf" class="apostles">
        <img src="./images/bednar.webp" alt="Elder Bednar" class="apostles">
        <img src="./images/cook.webp" alt="Elder Cook" class="apostles">
        <img src="./images/anderson.webp" alt="Elder Anderson" class="apostles">
        <img src="./images/rasband.webp" alt="Elder Rasband" class="apostles">
        <img src="./images/stevenson.webp" alt="Elder Stevenson" class="apostles">
        <img src="./images/renlund.webp" alt="Elder Renlund" class="apostles">
        <img src="./images/gong.webp" alt="Elder Gong" class="apostles">
        <img src="./images/soares.webp" alt="Elder Soares" class="apostles">
        <img src="./images/kearon.webp" alt="Elder Kearon" class="apostles">
        <img src="./images/causse.webp" alt="Elder Causse" class="apostles">
    </main>
</body>
</html>
