<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        /*************** 
        Global Styles
            ***************/

        * {
            margin: 0;
        }

        body {
            justify-self: center;
            align-self: center;
            width: 600px;
            background: rgb(120, 96, 64);
            border: 20px solid darkblue;
            border-radius: 10%;
        }

        /*************** 
        Hero Styles
            ***************/

        #hero {
            display: grid;
            grid-template-columns: 1fr 3fr 1fr;
            grid-template-rows: 2fr 1fr;
            z-index: -1;
        }
         
        #hero-img {
            width: 100%;
            border-radius: 10%;
            margin-bottom: -150px;
        }

        #hero-box {
            grid-column: 1/4;
            grid-row: 1/3;
            z-index: -1;
            width: 600px;
        }

        #closeBtn {
            grid-column: 1;
            grid-row: 1;
            background-color: white;
            color: black;
            width: 30px;
            height: 25px;
            text-align: center;
            margin: 20px;
            font-weight: bold;
        }

        /* *Hero Message Styles* */
        #hero-msg {
            grid-column: 2/3;
            grid-row: 2/3;
            color: white;
            text-align: center;
            align-self: start;
            font-size: 1.5;
        }

        /*************** 
        Form Styles
            ***************/

        #myForm {
            background-color: white;
            color: black;
            z-index: 1;
            justify-content: center;
            align-items: center;
            display: grid;
            grid-template-rows: 1fr 1fr 1fr 1fr 1fr 1fr 1fr;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 20px;

        }

        /*************** 
        Footer Styles
            ***************/

        footer {
            width: 600px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
            background-color: white;
            border-radius: 10%;
        }

        img {
            width: 110px;
            justify-self: center;
        }

    </style>




</head>

<body>
    <div id="hero">
            <div id="hero-box">
                <img id="hero-img" src="images/jesus_feeds_5000.jpeg" alt="Jesus">
            </div>
            <button type="button" id="closeBtn">X</button>
            <section id="hero-msg">
                <h1>Daily Feed</h1>
                <h2>Scripture a Day</h2>
            </section>
        </div>

    <div id="formContainer">
        <form id="myForm">
            <label id="username-label" for="username">User Name:</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label>Gender:</label>
            <div id="gender">
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </div>

            <section>
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to newsletter</label>
            </section>

            <section>
                <input type="checkbox" id="conditions" name="conditions" required>
                <label for="conditions">I acknowledge the terms and conditions</label>
            </section>

            <section>
                <button type="submit">Submit</button>
            </section>
        </form>
    </div>

    <footer>
        <img src="images/old_testament.webp" alt="Old Testament">
        <img src="images/new_testament.webp" alt="New Testament">
        <img src="images/book_of_mormon.webp" alt="Book of Mormon">
        <img src="images/doctrine_and_covenants.webp" alt="Doctrine and Covenants">
        <img src="images/pearl_of_great_price.webp" alt="Pearl of Great Price">
    </footer>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
        });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
        });
    </script>

</body>

</html>
